name: Deploy to Docker Hub

# When does this run? Every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab your code from GitHub
    - name: Check out the repo
      uses: actions/checkout@v4

    # 2. Log in to Docker Hub using your encrypted secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build and push the Backend Image
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: naveennavee/pdf-chatter-backend:latest

    # 4. Build and push the Frontend Image
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: naveennavee/pdf-chatter-frontend:latest