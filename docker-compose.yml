version: '3.8'

services:
  backend:
    build: .
    ports:
      - "10000:10000"
    environment:
      # This passes your computer's API key directly into the container
      - GEMINI_API_KEY=${GEMINI_API_KEY} 

  frontend:
    build: ./frontend
    ports:
      - "5173:80" # Maps your computer's port 5173 to the container's port 80
    depends_on:
      - backend